name: Validate KB

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r tools/requirements.txt

      - name: Validate frontmatter
        run: python tools/validate_frontmatter.py knowledge/

      - name: Validate integrity
        run: python tools/validate_integrity.py knowledge/

      - name: Check Obsidian wikilinks
        run: python tools/check_obsidian_links.py knowledge/
